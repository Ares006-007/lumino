<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your shopping cart — LUMINO premium electronics.">
  <title>Cart — LUMINO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar__logo">
      <a href="index.html">LUMINO</a>
    </div>
    <div class="navbar__links">
      <a href="shop.html">Shop</a>
      <a href="shop.html">Collections</a>
      <a href="index.html#about">About</a>
    </div>
    <div class="navbar__icons">
      <button class="navbar__icon" id="search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="cart.html" class="navbar__icon" aria-label="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-dot"></span>
      </a>
    </div>
  </nav>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-overlay__close">CLOSE</button>
    <div class="search-overlay__inner">
      <input type="text" class="search-overlay__input" placeholder="Search products...">
      <div class="search-results"></div>
    </div>
  </div>

  <!-- Empty Cart State -->
  <div class="cart-empty" id="cart-empty" style="display: none;">
    <div class="cart-empty__message">Your cart is empty.</div>
    <a href="shop.html" class="cart-empty__link">CONTINUE SHOPPING</a>
  </div>

  <!-- Cart Content -->
  <div class="cart-layout" id="cart-filled" style="display: none; border-bottom: 1px solid var(--border);">

    <!-- Cart Items -->
    <div class="cart-items">
      <div class="cart-items__header">
        <div class="cart-items__title">YOUR CART</div>
      </div>
      <div id="cart-items-list"></div>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
      <div class="order-summary__title">ORDER SUMMARY</div>
      <div id="order-summary-content"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__logo">LUMINO</div>
    <div class="footer__copy">2024 Lumino. All rights reserved.</div>
    <div class="footer__links">
      <a href="shop.html">Shop</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
